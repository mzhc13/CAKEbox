name: Approve tip into YAML

on:
issues:
types: [labeled]

jobs:
update-yaml:
if: github.event.action == 'labeled' && github.event.label.name == 'tips-approved'
runs-on: ubuntu-latest

```
permissions:
  contents: write
  pull-requests: write

steps:
  - name: Checkout repository
    uses: actions/checkout@v4
    with:
      token: ${{ secrets.GITHUB_TOKEN }}
      persist-credentials: true

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install dependencies
    run: |
      pip install pyyaml
      pip install mkdocs
      pip install mkdocs-material
      pip install mkdocs-macros-plugin

  - name: Save issue body
    run: |
      cat << 'EOF' > issue.txt
      ${{ github.event.issue.body }}
      EOF

  - name: Update YAML file
    run: |
      python << 'EOF'
      import yaml
      from pathlib import Path

      body = Path("issue.txt").read_text()

      def get(field):
          for line in body.splitlines():
              if line.startswith(field + ":"):
                  return line.split(":", 1)[1].strip()
          return ""

      theme = get("theme")

      if not theme:
          raise Exception("No theme found in issue body")

      yaml_path = Path(f"data/tips/{theme}.yml")

      if yaml_path.exists():
          data = yaml.safe_load(yaml_path.read_text()) or []
      else:
          data = []

      new_tip = {
          "title": get("title"),
          "text": get("text"),
          "emoji": get("emoji"),
          "color": get("color"),
      }

      data.insert(0, new_tip)

      yaml_path.parent.mkdir(parents=True, exist_ok=True)

      yaml_path.write_text(
          yaml.dump(
              data,
              allow_unicode=True,
              sort_keys=False
          ),
          encoding="utf-8"
      )

      print(f"Updated {yaml_path}")
      EOF

  - name: Create Pull Request
    uses: peter-evans/create-pull-request@v6
    with:
      token: ${{ secrets.GITHUB_TOKEN }}

      commit-message: |
        Add approved tip #${{ github.event.issue.number }}

      title: |
        Add approved tip #${{ github.event.issue.number }}

      body: |
        Auto-generated PR from issue #${{ github.event.issue.number }}

        This PR adds a newly approved community tip.

      branch: |
        auto/tip-${{ github.event.issue.number }}

      base: main

      delete-branch: true
