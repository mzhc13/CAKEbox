
name: Approve tip into YAML

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-yaml:
    if: github.event.label.name == 'tips-approved'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Parse issue + update file
        run: |
          python << 'EOF'
          import yaml
          from pathlib import Path

          body = """${{ github.event.issue.body }}"""

          def get(field):
              for line in body.splitlines():
                  if line.startswith(field + ":"):
                      return line.split(":", 1)[1].strip()
              return ""

          theme = get("theme")
          title = get("title")
          text = get("text")
          emoji = get("emoji")
          color = get("color")

          folder = Path(f"data/tips/{theme}")
          folder.mkdir(parents=True, exist_ok=True)

          slug = title.lower().replace(" ", "-")
          file_path = folder / f"{slug}.yml"

          data = {
              "title": title,
              "text": text,
              "emoji": emoji,
              "color": color
          }

          file_path.write_text(
              yaml.dump(data, sort_keys=False, allow_unicode=True),
              encoding="utf-8"
          )
          EOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Add approved tip #${{ github.event.issue.number }}"
          title: "Add tip #${{ github.event.issue.number }}"
          body: "Auto-generated PR from approved issue #${{ github.event.issue.number }}"
          branch: tip-${{ github.event.issue.number }}
          base: main
          delete-branch: true

